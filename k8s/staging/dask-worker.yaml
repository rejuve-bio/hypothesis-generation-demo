apiVersion: apps/v1
kind: Deployment
metadata:
  name: dask-worker
  namespace: hypothesis-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dask-worker
  template:
    metadata:
      labels:
        app: dask-worker
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: dask-worker
          image: rejuvebio/hypothesis-generation-dask-worker:staging
          imagePullPolicy: Always
          env:
            - name: DASK_ADDRESS
              value: "tcp://dask-scheduler:8786"
            - name: PREFECT_API_URL
              value: "http://prefect-service:4200/api"
            - name: PYTHONPATH
              value: "/app"
            - name: SWIPL_HOST
              value: "prolog-service"
            - name: SWIPL_PORT
              value: "4242"
            - name: ENSEMBL_HGNC_MAP
              value: "/app/data/ensembl_to_hgnc.pkl"
            - name: HGNC_ENSEMBL_MAP
              value: "/app/data/hgnc_to_ensembl.pkl"
            - name: GO_MAP
              value: "/app/data/go_map.pkl"
            - name: SKIP_SEED
              value: "true"
            - name: API_HOST
              value: "api-service"
            - name: API_PORT
              value: "5000"
            - name: REDIS_URL
              value: "redis://redis:6379"
          envFrom:
            - secretRef:
                name: hypothesis-secrets
          command:
            - "sh"
            - "-c"
            - "uv run dask worker tcp://dask-scheduler:8786 --nworkers 4 --nthreads 1 --memory-limit 40GB --preload src.dask_preload"
          resources:
            limits:
              cpu: "8"
              memory: "32Gi"
          volumeMounts:
            - name: app-source
              mountPath: /app
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-source
          hostPath:
            path: /mnt/hdd_1/tesnim/hypothesis-generation_demo
        - name: app-data
          hostPath:
            path: /mnt/hdd_1/tesnim/hypothesis-generation_demo/data
---
apiVersion: v1
kind: Service
metadata:
  name: dask-worker
  namespace: hypothesis-staging
spec:
  selector:
    app: dask-worker
  ports:
    - port: 8786
      targetPort: 8786
